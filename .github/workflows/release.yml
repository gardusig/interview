name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: xu-cheng/texlive-action@v2
        with:
          scheme: full
          run: |
            for f in resume/versions/*.tex; do
              latexmk -pdf "$f"
            done

      - uses: softprops/action-gh-release@v2
        with:
          files: resume/versions/*.pdf
          generate_release_notes: true
