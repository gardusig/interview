name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target resume -t interview-resume -f .github/docker/Dockerfile .
      - run: docker run --name resume-build interview-resume
      - run: docker cp resume-build:/workspace/resume/. resume/
      - run: docker rm resume-build

      - uses: actions/upload-artifact@v4
        with:
          name: resumes
          path: resume/*.pdf
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        with:
          files: resume/*.pdf
          generate_release_notes: true
