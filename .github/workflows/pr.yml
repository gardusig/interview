name: PR

on: pull_request

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target lint -t interview-lint -f .github/docker/Dockerfile .
      - run: docker run interview-lint

  resume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target resume -t interview-resume -f .github/docker/Dockerfile .
      - run: docker run interview-resume

  coding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target coding -t interview-coding -f .github/docker/Dockerfile .
      - run: docker run interview-coding
