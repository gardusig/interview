name: PR

on: pull_request

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install linters
        run: npm install -g markdownlint-cli lychee

      - name: Lint markdown
        run: markdownlint '**/*.md' --ignore node_modules

      - name: Check links
        run: lychee '**/*.md' --exclude 'https://linkedin.com'

      - name: Validate LaTeX resumes
        uses: xu-cheng/texlive-action@v2
        with:
          scheme: medium
          run: |
            for f in resume/versions/*.tex; do
              echo "Checking $f..."
              latexmk -pdf -silent "$f"
            done
